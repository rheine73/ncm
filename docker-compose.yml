version: "3.9"
services:
  monitor:
    build: .
    command: python monitor_fiscal.py
    env_file:
      - .env
    volumes:
      - ./:/app

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

